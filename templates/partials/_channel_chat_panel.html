<!-- Channel Chat Slide-Out Panel -->
<div id="channel-chat-panel"
     class="channel-chat-panel"
     role="complementary"
     aria-label="Channel chat"
     aria-hidden="true">
    <!-- Header -->
    <div class="border-b border-border bg-elevated">
        <!-- Row 1: Channel name + action buttons -->
        <div class="flex items-center justify-between gap-2 px-4 pt-3 pb-1">
            <div class="min-w-0 flex-1">
                <div class="flex items-center gap-2">
                    <h3 id="channel-chat-name" class="text-primary text-sm font-medium truncate"></h3>
                    <span id="channel-chat-type" class="px-1.5 py-0.5 text-[10px] uppercase tracking-wider rounded text-muted bg-surface border border-border"></span>
                </div>
            </div>
            <div class="flex items-center gap-0.5 flex-shrink-0">
                <!-- Kebab menu -->
                <div class="relative" id="channel-chat-kebab-wrap">
                    <button id="channel-chat-kebab-btn"
                            class="channel-chat-action-btn"
                            onclick="window.ChannelChat && window.ChannelChat.toggleKebab()"
                            title="Channel options"
                            aria-label="Channel options"
                            aria-haspopup="true"
                            aria-expanded="false">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="5" r="2"/>
                            <circle cx="12" cy="12" r="2"/>
                            <circle cx="12" cy="19" r="2"/>
                        </svg>
                    </button>
                    <div id="channel-chat-kebab-menu"
                         class="channel-chat-kebab-menu hidden"
                         role="menu">
                        <button class="channel-chat-kebab-item" role="menuitem" data-action="add-member">
                            <svg class="w-3.5 h-3.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            Add Member
                        </button>
                        <button class="channel-chat-kebab-item" role="menuitem" data-action="info">
                            <svg class="w-3.5 h-3.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            Channel Info
                        </button>
                        <button id="channel-chat-kebab-complete" class="channel-chat-kebab-item hidden" role="menuitem" data-action="complete">
                            <svg class="w-3.5 h-3.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                            Complete Channel
                        </button>
                        <button id="channel-chat-kebab-end" class="channel-chat-kebab-item hidden" role="menuitem" data-action="end">
                            <svg class="w-3.5 h-3.5 mr-2 flex-shrink-0 text-red" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path>
                            </svg>
                            <span class="text-red">End Channel</span>
                        </button>
                        <div class="border-t border-border my-1"></div>
                        <button class="channel-chat-kebab-item" role="menuitem" data-action="copy-slug">
                            <svg class="w-3.5 h-3.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                            </svg>
                            Copy Slug
                        </button>
                        <button class="channel-chat-kebab-item" role="menuitem" data-action="leave">
                            <svg class="w-3.5 h-3.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                            Leave Channel
                        </button>
                    </div>
                </div>
                <!-- Close button -->
                <button class="channel-chat-action-btn hover:!text-red"
                        onclick="window.ChannelChat && window.ChannelChat.close()"
                        title="Close chat"
                        aria-label="Close chat panel">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
        <!-- Row 2: Member pills -->
        <div id="channel-chat-member-pills" class="flex items-center gap-1.5 px-4 pb-2.5 pt-1 overflow-x-auto scrollbar-none">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Add Member Area (collapsible) -->
    <div id="channel-chat-add-member" class="channel-chat-add-member">
        <div class="px-4 py-3 border-b border-border bg-surface/50">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-muted uppercase tracking-wider font-medium">Add Member</span>
                <button class="text-xs text-muted hover:text-primary transition-colors"
                        onclick="window.ChannelChat && window.ChannelChat.toggleAddMember()">
                    Cancel
                </button>
            </div>
            <div id="channel-chat-add-member-picker"></div>
        </div>
    </div>

    <!-- Info Panel (collapsible) -->
    <div id="channel-chat-info" class="hidden border-b border-border bg-surface/50 px-4 py-3 text-xs overflow-y-auto" style="max-height: 220px;">
        <!-- Members -->
        <div class="mb-3">
            <div class="text-muted uppercase tracking-wider text-[10px] font-medium mb-1.5">Members</div>
            <div id="channel-chat-members" class="space-y-1">
                <span class="text-muted italic">Loading...</span>
            </div>
        </div>
        <!-- Technical Details -->
        <div>
            <div class="text-muted uppercase tracking-wider text-[10px] font-medium mb-1.5">Details</div>
            <div id="channel-chat-details" class="space-y-0.5 font-mono text-[11px]">
                <span class="text-muted italic">Loading...</span>
            </div>
        </div>
    </div>

    <!-- Message Feed -->
    <div id="channel-chat-feed" class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
        <!-- Load earlier messages button -->
        <div id="channel-chat-load-earlier" class="text-center hidden">
            <button class="text-xs text-cyan hover:text-primary transition-colors px-3 py-1 rounded border border-border hover:border-cyan/40"
                    onclick="window.ChannelChat && window.ChannelChat.loadEarlier()">
                Load earlier messages
            </button>
        </div>
        <!-- Messages rendered here by JS -->
        <div id="channel-chat-messages"></div>
        <!-- Loading indicator -->
        <div id="channel-chat-loading" class="text-center py-4 hidden">
            <span class="text-muted text-sm italic">Loading messages...</span>
        </div>
    </div>

    <!-- New messages indicator -->
    <div id="channel-chat-new-indicator" class="hidden absolute bottom-[72px] left-0 right-0 text-center pointer-events-none">
        <button class="pointer-events-auto inline-flex items-center gap-1 px-3 py-1 text-xs font-medium rounded-full bg-cyan text-void shadow-lg hover:bg-cyan/90 transition-colors"
                onclick="window.ChannelChat && window.ChannelChat.scrollToBottom()">
            New messages below
        </button>
    </div>

    <!-- Input Area -->
    <div class="border-t border-border bg-elevated px-4 py-3">
        <div class="flex gap-2">
            <textarea id="channel-chat-input"
                      class="form-well flex-1 px-3 py-2 text-sm resize-none"
                      rows="2"
                      placeholder="Type a message..."
                      aria-label="Message input"
                      onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); window.ChannelChat && window.ChannelChat.send();}"></textarea>
            <button id="channel-chat-send-btn"
                    class="flex-shrink-0 px-3 py-2 bg-cyan text-void text-sm font-medium rounded hover:bg-cyan/90 transition-colors self-end"
                    onclick="window.ChannelChat && window.ChannelChat.send()">
                Send
            </button>
        </div>
    </div>
</div>
